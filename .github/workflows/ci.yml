name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch on new push.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: INSTALL
  # Runs npm ci once and saves node_modules to cache.
  # All downstream jobs restore from this cache instead of
  # re-installing, saving 30-60 s per parallel job.
  # ─────────────────────────────────────────────────────────────
  install:
    name: Install Dependencies
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache node_modules
        id: cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      # Only installs when package-lock.json has changed.
      - name: Install
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci

  # ─────────────────────────────────────────────────────────────
  # JOB 2: CODE QUALITY  (parallel with test + security)
  # Lint, formatting, and TypeScript type-check.
  # ─────────────────────────────────────────────────────────────
  quality:
    name: Code Quality
    runs-on: ubuntu-24.04
    needs: install
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: ESLint
        run: npm run lint

      - name: Prettier
        run: npm run format:check

      - name: TypeScript typecheck
        run: npm run typecheck

  # ─────────────────────────────────────────────────────────────
  # JOB 3: TESTS & COVERAGE  (parallel with quality + security)
  # Runs Jest with coverage. Fails if coverage drops below 80%.
  # Uploads the HTML coverage report as a downloadable artifact.
  # ─────────────────────────────────────────────────────────────
  test:
    name: Tests & Coverage
    runs-on: ubuntu-24.04
    needs: install
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Run tests with coverage
        run: npm run test:coverage

      # Upload even on failure so the coverage report is always available.
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # JOB 4: SECURITY  (parallel with quality + test)
  # Dependency vulnerability audit. Fails on HIGH or CRITICAL.
  # ─────────────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-24.04
    needs: install
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: npm audit
        run: npm audit --audit-level=high

  # ─────────────────────────────────────────────────────────────
  # JOB 5: BUILD
  # Compiles TypeScript only after all checks pass.
  # Artifact is named with the commit SHA so every build is
  # traceable — deploy always uses the exact artifact it tested.
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-24.04
    needs: [quality, test, security]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Build TypeScript
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: build/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # JOB 6: DEPLOY  (only on push to main)
  # Downloads the exact artifact built in the previous job.
  # The `environment: production` block enables GitHub's manual
  # approval gate — reviewers must approve before deploy runs.
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-24.04
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: build/

      - name: Verify artifact
        run: ls -la build/

      - name: Deploy
        run: |
          echo "Deploying to production..."
          echo "Version : ${{ github.sha }}"
          echo "Branch  : ${{ github.ref_name }}"
          echo "Actor   : ${{ github.actor }}"
          echo "Deploy complete."
